backend:
  name: git-gateway
  branch: carrinho
  login: true

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "cardapio"
    label: "Cardápio"
    files:
      - file: "data/cardapio.json"
        label: "Pratos"
        name: "pratos"
        fields:
          - label: "Itens"
            name: "itens"
            widget: "list"
            fields:
              - { label: "Nome", name: "nome", widget: "string" }
              - { label: "Preço", name: "preco", widget: "string" }
              - { label: "Descrição", name: "descricao", widget: "text" }
              - { label: "Imagem", name: "imagem", widget: "image" }
  - name: "destaque"
    label: "Prato em Destaque"
    files:
      - file: "data/destaque.json"
        label: "Bloco de Destaque (Home)"
        name: "destaque_home"
        fields:
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Nome do prato", name: "nome", widget: "string" }
          - { label: "Link do botão", name: "link", widget: "string" }
          - { label: "Texto do botão", name: "botao", widget: "string" }

- name: "cupons"
    label: "Cupons"
    
    # 1. Deve ser "files" (plural), mesmo para um arquivo só
    files:
      # 2. O arquivo é definido como um item de lista (com "-")
      - file: "data/cupons.json"
        label: "Lista de Cupons"
        name: "cupons_lista"
        
        # 3. "fields" (campos) fica DENTRO da definição do arquivo
        fields:
          # 4. O widget "list" é o CAMPO principal que conterá os cupons
          - label: "Cupons"
            name: "lista_de_cupons" # Este é o nome que aparecerá no JSON
            widget: "list"
            
            # 5. Estes são os campos de CADA item da lista
            fields:
              - { label: "Código", name: "codigo", widget: "string" }
              - { label: "Tipo", name: "tipo", widget: "select", options: ["percentual", "fixo"] }
              - { label: "Valor", name: "valor", widget: "number", value_type: "float", step: 0.01, hint: "Use 0.10 para 10%, 0.25 para 25% ou 5.00 para R$5,00" }
